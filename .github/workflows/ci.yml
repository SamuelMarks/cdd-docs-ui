name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Tests
        run: npm run test

      - name: Update Badges
        run: node scripts/update-badges.js

      - name: Verify up-to-date README
        run: |
          git diff --exit-code README.md || (echo "README.md badges are out of date! Please run your pre-commit hooks locally and push." && exit 1)